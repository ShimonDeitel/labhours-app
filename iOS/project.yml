name: Labhours
options:
  bundleIdPrefix: com.shimondeitel.labhours
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Labhours:
    type: application
    platform: iOS
    sources:
      - path: Labhours
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.labhours
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Labhours/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LabhoursTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LabhoursTests
      - path: Labhours.storekit
    dependencies:
      - target: Labhours
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.labhours.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LabhoursUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LabhoursUITests
    dependencies:
      - target: Labhours
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.labhours.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Labhours:
    build:
      targets:
        Labhours: all
        LabhoursTests: [test]
        LabhoursUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Labhours.storekit
    test:
      config: Debug
      storeKitConfiguration: Labhours.storekit
      targets:
        - LabhoursTests
        - LabhoursUITests
    archive:
      config: Release
